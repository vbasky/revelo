name: Release

on:
  push:
    tags: [v*]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p revelo-cli --target ${{ matrix.target }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          archive="revelo-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "${archive}" revelo
          echo "archive=${archive}" >> "$GITHUB_ENV"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          archive="revelo-${{ github.ref_name }}-${{ matrix.target }}.zip"
          7z a "${archive}" revelo.exe
          echo "archive=${archive}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.archive }}

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: /tmp/assets

      - name: Checksums
        working-directory: /tmp/assets
        run: |
          for f in *; do
            [[ "$f" != *.sha256 ]] && shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          awk -v ver="${VERSION#v}" '
            $0 ~ "^## \\[" ver "\\] - " { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: revelo ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: /tmp/assets/*
          fail_on_unmatched_files: true

  publish:
    name: Publish to crates.io
    timeout-minutes: 15
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Bail if prior workflow run started < 10 min ago
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prev=$(gh api "repos/${{ github.repository }}/actions/workflows/release.yml/runs?per_page=5" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})][0].run_started_at")
          if [ -z "$prev" ] || [ "$prev" = "null" ]; then
            echo "No prior run found; proceeding."
            exit 0
          fi
          diff=$(( $(date +%s) - $(date -d "$prev" +%s) ))
          echo "Previous run started ${diff}s ago at ${prev}."
          if [ "$diff" -lt 600 ]; then
            echo "::error::Previous run started less than 10 minutes ago — bailing to avoid duplicate publish."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Publish crates (dependency order, skip versions already on crates.io)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Dependency order: a crate must appear after every crate it depends on.
          CRATES=(
            revelo-util
            revelo-core
            revelo-exiftool-tables     # must precede revelo-parsers-tag (its optional dep)
            revelo-parsers-video
            revelo-parsers-archive
            revelo-parsers-audio
            revelo-parsers-image
            revelo-parsers-tag
            revelo-parsers-text
            revelo-parsers-container
            revelo-reader
            revelo-export
            revelo-dispatcher
            revelo                     # facade — depends on core, dispatcher, parsers-tag
            revelo-cli
            revelo-cdylib
          )
          metadata=$(cargo metadata --format-version 1 --no-deps)
          for c in "${CRATES[@]}"; do
            version=$(jq -r --arg c "$c" '.packages[] | select(.name == $c) | .version' <<<"$metadata")
            if [ -z "$version" ]; then
              echo "::error::No version found for ${c} in workspace metadata"
              exit 1
            fi
            http=$(curl -sSL -o /dev/null -w "%{http_code}" \
              -H "User-Agent: revelo-release-bot (https://github.com/${{ github.repository }})" \
              "https://crates.io/api/v1/crates/${c}/${version}")
            if [ "$http" = "200" ]; then
              echo "==> SKIP ${c}@${version}: already on crates.io"
              continue
            fi
            echo "==> cargo publish ${c}@${version}"
            cargo publish -p "${c}"
          done

  formula:
    name: Homebrew tap
    needs: [publish]
    if: github.repository == 'vbasky/revelo'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Generate formula
        id: formula
        run: |
          tag="${{ github.ref_name }}"
          url="https://github.com/vbasky/revelo/archive/refs/tags/${tag}.tar.gz"
          sha=$(curl -sL "${url}" | shasum -a 256 | cut -d' ' -f1)
          version="${tag#v}"

          cat <<RUBY > /tmp/revelo.rb
          class Revelo < Formula
            desc "Read technical metadata from any media file, in pure Rust"
            homepage "https://github.com/vbasky/revelo"
            url "${url}"
            sha256 "${sha}"
            license "BSD-2-Clause"

            depends_on "rust" => :build

            def install
              system "cargo", "install",
                *std_cargo_args(path: "crates/revelo-cli")
            end

            test do
              assert_match version.to_s,
                shell_output("\#{bin}/revelo --version")
            end
          end
          RUBY
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Push to tap
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_CORE_TOKEN }}
        run: |
          VERSION="${{ steps.formula.outputs.version }}"

          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/vbasky/homebrew-revelo.git" /tmp/homebrew-revelo
          cd /tmp/homebrew-revelo

          mkdir -p Formula
          cp /tmp/revelo.rb Formula/revelo.rb
          git add Formula/revelo.rb
          git -c user.name="revelo-bot" \
             -c user.email="bot@revelo.app" \
             commit -m "revelo ${VERSION}" --allow-empty

          git push origin main
