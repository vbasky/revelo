name: Release

on:
  push:
    tags: [v*]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Install Rust
        run: |
          rustup update stable --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p revelo-cli --target ${{ matrix.target }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          archive="revelo-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "${archive}" revelo
          echo "archive=${archive}" >> "$GITHUB_ENV"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          archive="revelo-${{ github.ref_name }}-${{ matrix.target }}.zip"
          7z a "${archive}" revelo.exe
          echo "archive=${archive}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.archive }}

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          pattern: "*"
          merge-multiple: true
          path: /tmp/assets

      - name: Checksums
        working-directory: /tmp/assets
        run: |
          for f in *; do
            [[ "$f" != *.sha256 ]] && shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract the changelog section for this version
          awk -v ver="[${VERSION}]" '
            $0 ~ "^## " ver " - " { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          echo "body_path=/tmp/release-notes.md" >> "$GITHUB_ENV"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: revelo ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: /tmp/assets/*
          fail_on_unmatched_files: true

  formula:
    name: Homebrew formula
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source tarball SHA
        run: |
          tag="${{ github.ref_name }}"
          url="https://github.com/vbasky/revelo/archive/refs/tags/${tag}.tar.gz"
          sha=$(curl -sL "${url}" | shasum -a 256 | cut -d' ' -f1)

          cat <<RUBY
          class Revelo < Formula
            desc "Read technical metadata from any media file, in pure Rust"
            homepage "https://github.com/vbasky/revelo"
            url "https://github.com/vbasky/revelo/archive/refs/tags/${tag}.tar.gz"
            sha256 "${sha}"
            license "BSD-2-Clause"

            depends_on "rust" => :build

            def install
              system "cargo", "install",
                *std_cargo_args(path: "crates/revelo-cli")
            end

            test do
              assert_match version.to_s,
                shell_output("\#{bin}/revelo --version")
            end
          end
          RUBY
