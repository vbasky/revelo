name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: check + test + lint + doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy rustfmt

      - name: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: fmt
        run: cargo fmt --check

      - name: check
        run: cargo check --workspace --all-targets

      - name: clippy
        run: cargo clippy --workspace --all-targets

      - name: test
        run: cargo test --workspace

      - name: doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --document-private-items

  msrv:
    name: msrv (rust-version from Cargo.toml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: read MSRV from Cargo.toml
        id: msrv
        run: |
          v=$(grep -m1 '^rust-version' Cargo.toml | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: install rust ${{ steps.msrv.outputs.version }}
        run: |
          rustup toolchain install ${{ steps.msrv.outputs.version }} --no-self-update
          rustup default ${{ steps.msrv.outputs.version }}

      - name: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: check (consumer targets, matches published MSRV)
        run: cargo check --workspace
