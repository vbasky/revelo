[workspace]
resolver = "3"
members = [
    "crates/diff-harness",
    "crates/mediainfo-core",
    "crates/mediainfo-export",
    "crates/mediainfo-parsers-audio",
    "crates/mediainfo-parsers-container",
    "crates/mediainfo-parsers-image",
    "crates/zenlib",
]

[workspace.package]
edition = "2024"
license = "BSD-2-Clause"
repository = "https://github.com/MediaArea/MediaInfo"

[profile.release]
lto = "thin"
codegen-units = 1
