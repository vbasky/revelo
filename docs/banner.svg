    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="card"><rect x="0" y="0" width="1300" height="460" rx="18"/></clipPath>
    <clipPath id="lens"><circle cx="258" cy="214" r="88"/></clipPath>
  </defs>

  <rect x="0" y="0" width="1300" height="460" rx="18" fill="url(#bg)" stroke="#d5dce8" stroke-width="2"/>

