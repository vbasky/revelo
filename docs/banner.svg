      <stop offset="0.55" stop-color="#e8eef6"/>
      <stop offset="1" stop-color="#d7e0ec"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#c8d2e4"/>
    </pattern>
    <filter id="logoShadow" x="-15%" y="-15%" width="130%" height="140%">
